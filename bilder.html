<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bilder</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#111;color:white;padding:20px;}
h1{text-align:center;font-size:42px;margin-bottom:30px;}

.top-bar{
  display:flex;
  justify-content:center;
  gap:15px;
  margin-bottom:30px;
  flex-wrap:wrap;
}

.admin-btn{
  background:#2563eb;
  color:white;
  border:none;
  padding:12px 20px;
  border-radius:12px;
  cursor:pointer;
  font-size:16px;
  font-weight:bold;
  text-decoration:none;
}

.delete-btn{background:#dc2626;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
  max-width:1300px;
  margin:auto;
}

.card{
  background:#1c1c1f;
  padding:15px;
  border-radius:20px;
  position:relative;
}

.card img,
.card video{
  width:100%;
  border-radius:15px;
  margin-bottom:10px;
  max-height:250px;
  object-fit:cover;
}

.remove-btn{
  position:absolute;
  top:10px;
  right:10px;
  background:#dc2626;
  color:white;
  border:none;
  border-radius:8px;
  padding:5px 8px;
  cursor:pointer;
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
  z-index:999;
}

.modal-content{
  background:#1c1c1f;
  padding:20px;
  border-radius:20px;
  width:90%;
  max-width:600px;
}

input,textarea{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:10px;
  border:1px solid #444;
  background:#111;
  color:white;
}

.button-row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
</style>
</head>

<body>

<h1>Bilder</h1>

<div class="top-bar">
  <a href="startseite.html" class="admin-btn">Zurück</a>
  <button class="admin-btn" onclick="oeffneModal()">+ Bilder hinzufügen</button>
</div>

<div class="grid" id="container"></div>

<div class="modal" id="modal">
  <div class="modal-content">
    <input type="date" id="datum">
    <input type="text" id="auftrag" placeholder="Bei welchem Auftrag?">
    <textarea id="beschreibung" placeholder="Beschreibung optional"></textarea>
    <input type="file" id="dateien" multiple accept="image/*,video/*">

    <div class="button-row">
      <button class="admin-btn" onclick="speichern()">Speichern</button>
      <button class="admin-btn delete-btn" onclick="schliessen()">Abbrechen</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyBiKHmV0HEBB2Gr74VOgbosxRGs9MDa7uQ",
  authDomain: "nksp-app.firebaseapp.com",
  databaseURL: "https://nksp-app-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "nksp-app",
  storageBucket: "nksp-app.firebasestorage.app",
  messagingSenderId: "328702502215",
  appId: "1:328702502215:web:080148f3e768bfafc29862"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);
const storage = getStorage(app);

const bilderRef = ref(db, "bilder");

let userRolle = "";
let liste = [];

// 🔐 User prüfen
onAuthStateChanged(auth, (user) => {
  if(!user){
    window.location.href = "index.html";
    return;
  }

  onValue(ref(db, "benutzer"), (snap) => {
    snap.forEach((c) => {
      const d = c.val();
      if(d.uid === user.uid){
        userRolle = d.rolle;

        if(userRolle !== "admin"){
          document.querySelector(".top-bar button").style.display = "none";
        }
      }
    });
  }, { onlyOnce: true });
});

// 📂 Modal öffnen
window.oeffneModal = function(){
  document.getElementById("modal").style.display = "flex";
}

// ❌ schließen
window.schliessen = function(){
  document.getElementById("modal").style.display = "none";
}

// 💾 speichern
window.speichern = async function(){
  if(userRolle !== "admin"){
    alert("Nur Admin darf speichern");
    return;
  }

  const datum = document.getElementById("datum").value;
  const auftrag = document.getElementById("auftrag").value;
  const beschreibung = document.getElementById("beschreibung").value;
  const files = document.getElementById("dateien").files;

  if(!datum){
    alert("Datum ist Pflicht!");
    return;
  }

  const dateien = [];

  for(const file of files){
    const pfad = "bilder/" + Date.now() + "_" + file.name;
    const fileRef = storageRef(storage, pfad);

    await uploadBytes(fileRef, file);
    const url = await getDownloadURL(fileRef);

    dateien.push({
      url,
      type: file.type
    });
  }

  await push(bilderRef, {
    datum,
    auftrag: auftrag || "",
    beschreibung: beschreibung || "",
    dateien
  });

  alert("Gespeichert!");
  location.reload();
};

// 🖼️ anzeigen
function render(){
  const c = document.getElementById("container");
  c.innerHTML = "";

  liste.forEach((x,i)=>{
    let media = "";

    if(x.dateien){
      x.dateien.forEach(f=>{
        if(f.type.startsWith("image")){
          media += `<img src="${f.url}">`;
        } else if(f.type.startsWith("video")){
          media += `<video src="${f.url}" controls></video>`;
        }
      });
    }

    c.innerHTML += `
      <div class="card">
        ${userRolle === "admin" ? `<button class="remove-btn" onclick="loeschen(${i})">X</button>` : ""}
        ${media}
        <p><b>Datum:</b> ${x.datum}</p>
        <p><b>Auftrag:</b> ${x.auftrag || "-"}</p>
        <p>${x.beschreibung || ""}</p>
      </div>
    `;
  });
}

// ❌ löschen
window.loeschen = async function(i){
  if(userRolle !== "admin"){
    alert("Nur Admin darf löschen");
    return;
  }

  await remove(ref(db, "bilder/" + liste[i].id));
};

// 🔄 laden
onValue(bilderRef, (snap)=>{
  liste = [];
  snap.forEach(c=>{
    liste.push({
      id: c.key,
      ...c.val()
    });
  });
  render();
});
</script>

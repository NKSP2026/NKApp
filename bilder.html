<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bilder</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#111;color:white;padding:20px;}
h1{text-align:center;margin-bottom:30px;}

.top-bar{display:flex;justify-content:center;gap:10px;margin-bottom:30px;}
.admin-btn{background:#2563eb;color:white;border:none;padding:10px 18px;border-radius:10px;cursor:pointer;}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;}

.card{background:#1c1c1f;padding:15px;border-radius:15px;position:relative;}
.card img,.card video{width:100%;border-radius:10px;margin-bottom:10px;}

.remove-btn{
  position:absolute;
  top:10px;
  right:10px;
  background:red;
  color:white;
  border:none;
  padding:5px;
  cursor:pointer;
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:#1c1c1f;
  padding:20px;
  border-radius:15px;
  width:90%;
  max-width:500px;
}

input,textarea{width:100%;padding:10px;margin-bottom:10px;background:#111;color:white;border:1px solid #444;}
</style>
</head>

<body>

<h1>Bilder</h1>

<div class="top-bar">
<a href="startseite.html" class="admin-btn">Zurück</a>
<button class="admin-btn" onclick="oeffneModal()">+ Bilder hinzufügen</button>
</div>

<div class="grid" id="container"></div>

<div class="modal" id="modal">
<div class="modal-content">
<input type="date" id="datum">
<input type="text" id="auftrag" placeholder="Auftrag">
<textarea id="beschreibung" placeholder="Beschreibung"></textarea>
<input type="file" id="dateien" multiple>

<button onclick="speichern()" class="admin-btn">Speichern</button>
<button onclick="schliessen()" class="admin-btn" style="background:red;">Abbrechen</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

const firebaseConfig = {
apiKey:"AIzaSyBiKHmV0HEBB2Gr74VOgbosxRGs9MDa7uQ",
authDomain:"nksp-app.firebaseapp.com",
databaseURL:"https://nksp-app-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"nksp-app",
storageBucket:"nksp-app.firebasestorage.app",
messagingSenderId:"328702502215",
appId:"1:328702502215:web:080148f3e768bfafc29862"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);
const storage = getStorage(app);

const bilderRef = ref(db,"bilder");

let rolle="";
let liste=[];

onAuthStateChanged(auth,user=>{
if(!user){location.href="index.html";return;}

onValue(ref(db,"benutzer"),snap=>{
snap.forEach(c=>{
if(c.val().uid===user.uid){
rolle=c.val().rolle;
if(rolle!=="admin"){
document.querySelector(".top-bar button").style.display="none";
}
}
});
},{onlyOnce:true});
});

window.oeffneModal=()=>{modal.style.display="flex";}
window.schliessen=()=>{modal.style.display="none";}

window.speichern=async()=>{
if(rolle!=="admin")return alert("Nur Admin");

const datum=document.getElementById("datum").value;
if(!datum)return alert("Datum fehlt");

const files=document.getElementById("dateien").files;
const arr=[];

for(const f of files){
const path="bilder/"+Date.now()+"_"+f.name;
const refFile=storageRef(storage,path);
await uploadBytes(refFile,f);
arr.push(await getDownloadURL(refFile));
}

await push(bilderRef,{datum,arr});

alert("Gespeichert");
location.reload();
};

window.loeschen=async(i)=>{
if(rolle!=="admin")return;
await remove(ref(db,"bilder/"+liste[i].id));
};

function render(){
container.innerHTML="";
liste.forEach((x,i)=>{
container.innerHTML+=`
<div class="card">
${rolle==="admin"?`<button class="remove-btn" onclick="loeschen(${i})">X</button>`:""}
${(x.arr||[]).map(u=>`<img src="${u}">`).join("")}
<p>${x.datum}</p>
</div>`;
});
}

onValue(bilderRef,snap=>{
liste=[];
snap.forEach(c=>liste.push({id:c.key,...c.val()}));
render();
});
</script>
</body>
</html>

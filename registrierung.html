<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrierung - NKSP</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#111;
      color:white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .register-box{
      width:100%;
      max-width:500px;
      background:#1c1c1f;
      border-radius:25px;
      padding:35px;
      box-shadow:0 0 25px rgba(0,0,0,0.4);
    }

    h1{
      text-align:center;
      margin-bottom:25px;
      font-size:34px;
    }

    input{
      width:100%;
      padding:14px;
      margin-bottom:14px;
      border:none;
      border-radius:12px;
      background:#111;
      color:white;
      border:1px solid #333;
      font-size:15px;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:12px;
      background:#2563eb;
      color:white;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      margin-top:10px;
    }

    button:hover{
      background:#1d4ed8;
    }

    .back-btn{
      background:#374151;
    }

    .back-btn:hover{
      background:#4b5563;
    }

    .info{
      margin-top:20px;
      color:#aaa;
      font-size:14px;
      line-height:1.6;
      text-align:center;
    }

    .error{
      margin-top:15px;
      color:#ef4444;
      text-align:center;
      font-size:14px;
    }

    .success{
      margin-top:15px;
      color:#22c55e;
      text-align:center;
      font-size:14px;
    }
  </style>
</head>
<body>

  <div class="register-box">
    <h1>Registrierung</h1>

    <input type="text" id="vorname" placeholder="Vorname">
    <input type="text" id="nachname" placeholder="Nachname">
    <input type="email" id="email" placeholder="E-Mail">
    <input type="password" id="passwort" placeholder="Passwort">
    <input type="password" id="passwort2" placeholder="Passwort wiederholen">
    <input type="text" id="code" placeholder="Verifizierungscode">

    <button onclick="registrieren()">Registrieren</button>
    <button class="back-btn" onclick="window.location.href='index.html'">Zurück zum Login</button>

    <div class="error" id="fehler"></div>
    <div class="success" id="erfolg"></div>

    <div class="info">
      Verifizierungscode für Mitarbeiter- oder Adminrechte<br>
       bekommen sie bei ihren Vorgesetzten, deren Vertreter oder IT´ler
    </div>
  </div>

  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
  import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBiKHmV0HEBB2Gr74VOgbosxRGs9MDa7uQ",
    authDomain: "nksp-app.firebaseapp.com",
    databaseURL: "https://nksp-app-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "nksp-app",
    storageBucket: "nksp-app.firebasestorage.app",
    messagingSenderId: "328702502215",
    appId: "1:328702502215:web:080148f3e768bfafc29862"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  const benutzerRef = ref(db, "benutzer");

  const mitarbeiterCode = "2026";
  const adminCode = "1992";

  window.registrieren = async function () {
    const vorname = document.getElementById("vorname").value.trim();
    const nachname = document.getElementById("nachname").value.trim();
    const email = document.getElementById("email").value.trim();
    const passwort = document.getElementById("passwort").value;
    const passwort2 = document.getElementById("passwort2").value;
    const code = document.getElementById("code").value.trim();

    const fehler = document.getElementById("fehler");
    const erfolg = document.getElementById("erfolg");

    fehler.innerText = "";
    erfolg.innerText = "";

    if (!vorname || !nachname || !email || !passwort || !passwort2 || !code) {
      fehler.innerText = "Bitte alle Felder ausfüllen";
      return;
    }

    if (passwort !== passwort2) {
      fehler.innerText = "Passwörter stimmen nicht überein";
      return;
    }

    let rolle = "";
    let rechte = {};

    if (code === mitarbeiterCode) {
      rolle = "mitarbeiter";
      rechte = {
        mitarbeiter_lesen: true,
        dokumente_download: true,
        dienstberichte_upload: true,
        mitarbeiter_hinzufuegen: false,
        dokumente_hinzufuegen: false,
        dienste_hinzufuegen: false
      };
    } else if (code === adminCode) {
      rolle = "admin";
      rechte = {
        mitarbeiter_lesen: true,
        dokumente_download: true,
        dienstberichte_upload: true,
        mitarbeiter_hinzufuegen: true,
        dokumente_hinzufuegen: true,
        dienste_hinzufuegen: true
      };
    } else {
      fehler.innerText = "Ungültiger Verifizierungscode";
      return;
    }

    try {
      const userCredential = await createUserWithEmailAndPassword(auth, email, passwort);

      await push(benutzerRef, {
        uid: userCredential.user.uid,
        vorname: vorname,
        nachname: nachname,
        email: email,
        rolle: rolle,
        rechte: rechte,
        online: false,
        erstelltAm: new Date().toISOString()
      });

      /* ADMIN BENACHRICHTIGUNG */
      await push(ref(db, "benachrichtigungen"), {
        titel: "Neue Registrierung",
        name: `${vorname} ${nachname}`,
        typ: "Registrierung",
        text: `${vorname} ${nachname} hat sich neu registriert`,
        zeit: Date.now()
      });

      erfolg.innerText = "Registrierung erfolgreich";

      document.getElementById("vorname").value = "";
      document.getElementById("nachname").value = "";
      document.getElementById("email").value = "";
      document.getElementById("passwort").value = "";
      document.getElementById("passwort2").value = "";
      document.getElementById("code").value = "";

      setTimeout(() => {
        window.location.href = "index.html";
      }, 1500);

    } catch (error) {
      console.error(error);

      if (error.code === "auth/email-already-in-use") {
        fehler.innerText = "E-Mail wird bereits verwendet";
      } else if (error.code === "auth/invalid-email") {
        fehler.innerText = "Ungültige E-Mail Adresse";
      } else if (error.code === "auth/weak-password") {
        fehler.innerText = "Passwort muss mindestens 6 Zeichen haben";
      } else {
        fehler.innerText = "Registrierung fehlgeschlagen";
      }
    }
  };
</script>

</body>
</html>

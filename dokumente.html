<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dokumente</title>
<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:Arial,sans-serif;
}
body{
  background:#111;
  color:white;
  padding:20px;
}
h1{
  text-align:center;
  font-size:48px;
  margin-bottom:30px;
}
.top-bar{
  display:flex;
  justify-content:center;
  gap:15px;
  margin-bottom:30px;
  flex-wrap:wrap;
}
.admin-btn{
  background:#2563eb;
  color:white;
  border:none;
  padding:12px 20px;
  border-radius:12px;
  cursor:pointer;
  font-size:16px;
  font-weight:bold;
  text-decoration:none;
}
.delete-btn{
  background:#dc2626;
}
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:25px;
  max-width:1200px;
  margin:auto;
}
.card{
  background:#1c1c1f;
  border-radius:22px;
  padding:20px;
  position:relative;
}
.remove-btn{
  position:absolute;
  top:10px;
  right:10px;
  background:#dc2626;
  color:white;
  border:none;
  border-radius:8px;
  padding:5px 8px;
  cursor:pointer;
}
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}
.modal-content{
  background:#1c1c1f;
  padding:20px;
  border-radius:20px;
  width:90%;
  max-width:500px;
}
input{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:10px;
  border:1px solid #444;
  background:#111;
  color:white;
}
.button-row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
</style>
</head>
<body>

<h1>Dokumente</h1>

<div class="top-bar">
  <a href="startseite.html" class="admin-btn">Zurück</a>
  <button class="admin-btn" onclick="oeffneModal()">+ Dokument hinzufügen</button>
</div>

<div class="grid" id="container"></div>

<div class="modal" id="modal">
  <div class="modal-content">
    <input id="name" placeholder="Dokumentenname">
    <input type="file" id="datei" accept="application/pdf">

    <div class="button-row">
      <button class="admin-btn" onclick="speichern()">Speichern</button>
      <button class="admin-btn delete-btn" onclick="schliessen()">Abbrechen</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
import { getStorage, ref as storageRef, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyBiKHmV0HEBB2Gr74VOgbosxRGs9MDa7uQ",
  authDomain: "nksp-app.firebaseapp.com",
  databaseURL: "https://nksp-app-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "nksp-app",
  storageBucket: "nksp-app.firebasestorage.app",
  messagingSenderId: "328702502215",
  appId: "1:328702502215:web:080148f3e768bfafc29862"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);
const dokumenteRef = ref(db, 'dokumente');

const adminPasswort = 'Admin2026';
let liste = [];

window.oeffneModal = function(){
  const p = prompt('Admin Passwort eingeben');
  if(p !== adminPasswort) return;
  document.getElementById('modal').style.display = 'flex';
}

window.speichern = async function(){
  const n = document.getElementById('name').value;
  const d = document.getElementById('datei').files[0];

  if(!n || !d){
    alert('Bitte alles ausfüllen');
    return;
  }

  try{
    const dateiname = Date.now() + "_" + d.name;
    const dateiRef = storageRef(storage, "dokumente/" + dateiname);

    await uploadBytes(dateiRef, d);

    const downloadURL = await getDownloadURL(dateiRef);

    await push(dokumenteRef, {
      name: n,
      datei: downloadURL,
      storagePath: "dokumente/" + dateiname
    });

    alert('Dokument gespeichert');
    schliessen();
  }catch(error){
    console.error(error);
    alert('Fehler beim Hochladen');
  }
}

function render(){
  const c = document.getElementById('container');
  c.innerHTML = '';

  liste.forEach((x, i) => {
    c.innerHTML += `
    <div class="card">
      <button class="remove-btn" onclick="loeschen(${i})">X</button>
      <h2>${x.name}</h2>
      <br>
      <a href="${x.datei}" download="${x.name}.pdf" class="admin-btn">Herunterladen</a>
    </div>`;
  });
}

window.loeschen = async function(i){
  const p = prompt('Admin Passwort eingeben');
  if(p !== adminPasswort) return;

  try{
    if(liste[i].storagePath){
      const fileRef = storageRef(storage, liste[i].storagePath);
      await deleteObject(fileRef);
    }

    await remove(ref(db, 'dokumente/' + liste[i].id));
  }catch(error){
    console.error(error);
    alert('Fehler beim Löschen');
  }
}

window.schliessen = function(){
  document.getElementById('modal').style.display = 'none';
}

onValue(dokumenteRef, (snapshot) => {
  liste = [];

  snapshot.forEach((child) => {
    liste.push({
      id: child.key,
      ...child.val()
    });
  });

  render();
});
</script>

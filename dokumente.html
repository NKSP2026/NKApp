<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dokumente</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; font-family:Arial,sans-serif; }
    body { background:#111; color:white; padding:20px; }
    h1 { text-align:center; font-size:48px; margin-bottom:30px; }
    .top-bar { display:flex; justify-content:center; gap:15px; margin-bottom:30px; flex-wrap:wrap; }
    .admin-btn {
      background:#2563eb; color:white; border:none; padding:12px 20px;
      border-radius:12px; cursor:pointer; font-size:16px; font-weight:bold; text-decoration:none;
    }
    .container { max-width:1200px; margin:auto; }
    .grid { display:grid; grid-template-columns:repeat(2,1fr); gap:25px; }
    .card { background:#1c1c1f; border-radius:22px; padding:20px; position:relative; }
    .remove-btn {
      position:absolute; top:10px; right:10px; background:#dc2626; color:white;
      border:none; border-radius:8px; padding:5px 8px; cursor:pointer;
    }
    .modal {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8);
      justify-content:center; align-items:center; z-index:999;
    }
    .modal-content {
      background:#1c1c1f; border-radius:20px; padding:20px; width:90%; max-width:500px;
    }
    input {
      width:100%; padding:12px; margin-bottom:12px; border-radius:10px;
      border:1px solid #444; background:#111; color:white;
    }
  </style>
</head>
<body>
<h1>Dokumente</h1>

<div class="top-bar">
  <a href="index.html" class="admin-btn">Zurück</a>
  <button class="admin-btn" onclick="oeffneDokumentFormular()">+ Dokument hinzufügen</button>
</div>

<div class="container">
  <div class="grid" id="dokumenteContainer"></div>
</div>

<div class="modal" id="dokumentModal">
  <div class="modal-content">
    <input type="text" id="dokumentName" placeholder="Dokumentenname">
    <input type="file" id="dokumentDatei" accept="application/pdf">
    <button class="admin-btn" onclick="speichereDokument()">Speichern</button>
  </div>
</div>

<script>
const adminPasswort = "Admin2026";
let dokumenteListe = [];

function oeffneDokumentFormular() {
  const passwort = prompt('Admin Passwort eingeben');
  if(passwort !== adminPasswort) return;
  document.getElementById('dokumentModal').style.display = 'flex';
}

function speichereDokument() {
  const name = document.getElementById('dokumentName').value;
  const datei = document.getElementById('dokumentDatei').files[0];
  if(!name || !datei) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    dokumenteListe.push({ name: name, datei: e.target.result });
    renderDokumente();
    document.getElementById('dokumentModal').style.display = 'none';
  };
  reader.readAsDataURL(datei);
}

function renderDokumente() {
  const container = document.getElementById('dokumenteContainer');
  container.innerHTML = '';

  dokumenteListe.forEach((dokument, index) => {
    container.innerHTML += `
      <div class="card">
        <button class="remove-btn" onclick="loescheDokument(${index})">X</button>
        <h2>${dokument.name}</h2>
        <br>
        <a href="${dokument.datei}" download="${dokument.name}.pdf" class="admin-btn">Herunterladen</a>
      </div>
    `;
  });
}

function loescheDokument(index) {
  const passwort = prompt('Admin Passwort eingeben');
  if(passwort !== adminPasswort) return;
  dokumenteListe.splice(index, 1);
  renderDokumente();
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schulungen</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#111;color:white;padding:20px;}
h1{text-align:center;font-size:42px;margin-bottom:30px;}
.top-bar{display:flex;justify-content:center;gap:15px;margin-bottom:30px;flex-wrap:wrap;}
.admin-btn{background:#2563eb;color:white;border:none;padding:12px 20px;border-radius:12px;cursor:pointer;font-size:16px;font-weight:bold;text-decoration:none;}
.delete-btn{background:#dc2626;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:20px;max-width:1300px;margin:auto;}
.card{background:#1c1c1f;padding:20px;border-radius:20px;position:relative;}
.card h2{margin-bottom:10px;}
.card p{margin-bottom:8px;color:#ccc;}
.remove-btn{position:absolute;top:10px;right:10px;background:#dc2626;color:white;border:none;border-radius:8px;padding:5px 8px;cursor:pointer;}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);justify-content:center;align-items:center;z-index:999;}
.modal-content{background:#1c1c1f;padding:20px;border-radius:20px;width:90%;max-width:600px;max-height:90vh;overflow-y:auto;}
input,textarea{width:100%;padding:12px;margin-bottom:12px;border-radius:10px;border:1px solid #444;background:#111;color:white;}
.button-row{display:flex;gap:10px;flex-wrap:wrap;}
</style>
</head>
<body>

  <h1>Schulungen</h1>

<div class="top-bar">
  <a href="startseite.html" class="admin-btn">Zurück</a>
  <button class="admin-btn" onclick="oeffneModal()">+ Schulung hinzufügen</button>
</div>

<div class="grid" id="container"></div>

<div class="modal" id="modal">
  <div class="modal-content">
    <input type="text" id="titel" placeholder="Welche Schulung war es?">
    <textarea id="beschreibung" placeholder="Worum ging es?"></textarea>
    <input type="date" id="datum">

    <label>Bilder auswählen</label>
    <input type="file" id="bilder" multiple accept="image/*">

    <label>Videos auswählen</label>
    <input type="file" id="videos" multiple accept="video/*">

    <label>Dokumente auswählen</label>
    <input type="file" id="dokumente" multiple accept="application/pdf">

    <div class="button-row">
      <button class="admin-btn" onclick="speichern()">Speichern</button>
      <button class="admin-btn delete-btn" onclick="schliessen()">Abbrechen</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
import { getStorage, ref as storageRef, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyBiKHmV0HEBB2Gr74VOgbosxRGs9MDa7uQ",
  authDomain: "nksp-app.firebaseapp.com",
  databaseURL: "https://nksp-app-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "nksp-app",
  storageBucket: "nksp-app.firebasestorage.app",
  messagingSenderId: "328702502215",
  appId: "1:328702502215:web:080148f3e768bfafc29862"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);
const storage = getStorage(app);
const schulungenRef = ref(db, "schulungen");  

let userRolle = "";
let liste = [];

onAuthStateChanged(auth, (user) => {
  if(!user){
    window.location.href = "index.html";
    return;
  }

  onValue(ref(db, "benutzer"), (snapshot) => {
    snapshot.forEach((child) => {
      const daten = child.val();

      if(daten.uid === user.uid){
        userRolle = daten.rolle;

        if(userRolle !== "admin"){
          document.querySelector(".top-bar button").style.display = "none";
        }
      }
    });
  }, { onlyOnce:true });
});

window.oeffneModal = function(){
  document.getElementById("modal").style.display = "flex";
}

window.schliessen = function(){
  document.getElementById("modal").style.display = "none";
}

window.speichern = async function(){
  const titel = document.getElementById("titel").value;
  const beschreibung = document.getElementById("beschreibung").value;
  const datum = document.getElementById("datum").value;

  if(!titel || !datum){
    alert("Bitte Titel und Datum ausfüllen");
    return;
  }

  const bilder = [];
  const videos = [];
  const dokumente = [];

  for(const datei of document.getElementById("bilder").files){
    const pfad = "schulungen/bilder/" + Date.now() + "_" + datei.name;
    const fileRef = storageRef(storage, pfad);
    await uploadBytes(fileRef, datei);
    bilder.push(await getDownloadURL(fileRef));
  }

  for(const datei of document.getElementById("videos").files){
    const pfad = "schulungen/videos/" + Date.now() + "_" + datei.name;
    const fileRef = storageRef(storage, pfad);
    await uploadBytes(fileRef, datei);
    videos.push(await getDownloadURL(fileRef));
  }

  for(const datei of document.getElementById("dokumente").files){
    const pfad = "schulungen/dokumente/" + Date.now() + "_" + datei.name;
    const fileRef = storageRef(storage, pfad);
    await uploadBytes(fileRef, datei);
    dokumente.push(await getDownloadURL(fileRef));
  }

  await push(schulungenRef, {
    titel,
    beschreibung,
    datum,
    bilder,
    videos,
    dokumente
  });

  alert("Schulung gespeichert");
  location.reload();
}

function render(){
  const c = document.getElementById("container");
  c.innerHTML = "";

  liste.forEach((x,i) => {
    c.innerHTML += `
      <div class="card">
        ${userRolle === "admin" ? `<button class="remove-btn" onclick="loeschen(${i})">X</button>` : ""}
        <h2>${x.titel}</h2>
        <p>${x.datum}</p>
        <p>${x.beschreibung}</p>
        <p>Bilder: ${x.bilder ? x.bilder.length : 0}</p>
        <p>Videos: ${x.videos ? x.videos.length : 0}</p>
        <p>Dokumente: ${x.dokumente ? x.dokumente.length : 0}</p>
      </div>
    `;
  });
}

window.loeschen = async function(i){
  await remove(ref(db, "schulungen/" + liste[i].id));
}

onValue(schulungenRef, (snapshot) => {
  liste = [];
  snapshot.forEach((child) => {
    liste.push({ id: child.key, ...child.val() });
  });
  render();
});
</script>
</body>
</html>

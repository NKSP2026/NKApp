<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schulungen</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#0f0f11;color:white;padding:20px;}

h1{text-align:center;margin-bottom:30px;font-size:38px;}

.top-bar{
  display:flex;
  justify-content:center;
  gap:15px;
  margin-bottom:30px;
}

.admin-btn{
  background:#2563eb;
  padding:12px 20px;
  border-radius:12px;
  color:white;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

/* Karten */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:20px;
  max-width:1200px;
  margin:auto;
}

.card{
  background:#1c1c1f;
  padding:15px;
  border-radius:20px;
  cursor:pointer;
  position:relative;
}

.card img{
  width:100%;
  border-radius:15px;
  max-height:200px;
  object-fit:cover;
}

.card h2{margin-top:10px;}
.card p{color:#aaa;margin-top:5px;}

.remove-btn{
  position:absolute;
  top:10px;
  right:10px;
  background:#dc2626;
  border:none;
  color:white;
  border-radius:8px;
  padding:5px 8px;
  cursor:pointer;
}

/* Modal groß */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
  z-index:999;
}

.modal-content{
  background:#1c1c1f;
  padding:20px;
  border-radius:20px;
  width:90%;
  max-width:900px;
  max-height:90vh;
  overflow-y:auto;
}

.modal img,
.modal video{
  width:100%;
  border-radius:10px;
  margin-top:10px;
}

.download{
  display:inline-block;
  margin-top:10px;
  padding:8px 12px;
  background:#2563eb;
  border-radius:8px;
  color:white;
  text-decoration:none;
}

/* Upload Modal */
.upload-modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.upload-box{
  background:#1c1c1f;
  padding:20px;
  border-radius:20px;
  width:90%;
  max-width:500px;
}

input,textarea{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  background:#111;
  color:white;
  border:1px solid #444;
}
</style>
</head>

<body>

<h1>Schulungen</h1>

<div class="top-bar">
  <a href="startseite.html" class="admin-btn">Zurück</a>
  <button class="admin-btn" onclick="oeffneModal()">+ Schulung hinzufügen</button>
</div>

<div class="grid" id="container"></div>

<!-- Upload Modal -->
<div class="modal" id="modal">
  <div class="modal-content">
    <input type="text" id="titel" placeholder="Titel">
    <textarea id="beschreibung" placeholder="Beschreibung"></textarea>
    <input type="date" id="datum">

    <input type="file" id="bilder" multiple accept="image/*">
    <input type="file" id="videos" multiple accept="video/*">
    <input type="file" id="docs" multiple accept="application/pdf">

    <button class="admin-btn" onclick="speichern()">Speichern</button>
    <button class="admin-btn" onclick="schliessen()">Abbrechen</button>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal" id="detailModal">
  <div class="modal-content" id="detailContent"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyBiKHmV0HEBB2Gr74VOgbosxRGs9MDa7uQ",
  authDomain: "nksp-app.firebaseapp.com",
  databaseURL: "https://nksp-app-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "nksp-app",
  storageBucket: "nksp-app.firebasestorage.app",
  messagingSenderId: "328702502215",
  appId: "1:328702502215:web:080148f3e768bfafc29862"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);
const storage = getStorage(app);

const dbRef = ref(db,"schulungen");

let rolle="";
let liste=[];

/* LOGIN */
onAuthStateChanged(auth,(user)=>{
  if(!user){
    window.location.href="index.html";
    return;
  }

  onValue(ref(db,"benutzer"),snap=>{
    snap.forEach(c=>{
      if(c.val().uid===user.uid){
        rolle=c.val().rolle;

        if(rolle!=="admin"){
          document.querySelector(".top-bar button").style.display="none";
        }
      }
    });
  },{onlyOnce:true});
});

/* MODAL */
window.oeffneModal=()=>{
  document.getElementById("modal").style.display="flex";
}

window.schliessen=()=>{
  document.getElementById("modal").style.display="none";
}

/* SPEICHERN */
window.speichern=async()=>{
  if(rolle!=="admin") return alert("Nur Admin");

  const datum=document.getElementById("datum").value;
  if(!datum) return alert("Datum ist Pflicht");

  const bilderFiles=document.getElementById("bilder").files;
  const videoFiles=document.getElementById("videos").files;
  const docFiles=document.getElementById("docs").files;

  const bilder=[];
  const videos=[];
  const docs=[];

   for(const f of bilderFiles){
    const r=sRef(storage,"schulungen/"+Date.now()+"_"+f.name);
    await uploadBytes(r,f);
    bilder.push(await getDownloadURL(r));
  }

  for(const f of videoFiles){
    const r=sRef(storage,"schulungen/"+Date.now()+"_"+f.name);
    await uploadBytes(r,f);
    videos.push(await getDownloadURL(r));
  }

  for(const f of docFiles){
    const r=sRef(storage,"schulungen/"+Date.now()+"_"+f.name);
    await uploadBytes(r,f);
    docs.push(await getDownloadURL(r));
  }

  await push(dbRef,{
    titel:document.getElementById("titel").value || "",
    beschreibung:document.getElementById("beschreibung").value || "",
    datum,
    bilder,
    videos,
    docs
  });

  alert("Gespeichert");
  location.reload();
};

/* DETAIL */
window.showDetail=(i)=>{
  const x=liste[i];

  let html=`
  <h2>${x.titel || "Schulung"}</h2>
  <p>${x.datum}</p>
  <p>${x.beschreibung || ""}</p>
  `;

  (x.bilder||[]).forEach(b=>html+=`<img src="${b}">`);
  (x.videos||[]).forEach(v=>html+=`<video controls src="${v}"></video>`);
  (x.docs||[]).forEach(d=>html+=`<a href="${d}" target="_blank">📄 Dokument öffnen</a><br>`);

  document.getElementById("detailContent").innerHTML=html;
  document.getElementById("detailModal").style.display="flex";
};

/* LÖSCHEN */
window.loeschen=async(i)=>{
  if(rolle!=="admin") return;
  await remove(ref(db,"schulungen/"+liste[i].id));
};

/* RENDER */
onValue(dbRef,snap=>{
  liste=[];
  snap.forEach(c=>liste.push({id:c.key,...c.val()}));

  const container=document.getElementById("container");
  container.innerHTML="";

  liste.forEach((x,i)=>{
    container.innerHTML+=`
    <div class="card" onclick="showDetail(${i})">
      ${rolle==="admin"?`<button class="remove-btn" onclick="event.stopPropagation();loeschen(${i})">X</button>`:""}
      ${x.bilder?.[0]?`<img src="${x.bilder[0]}">`:""}
      <h2>${x.titel || "Schulung"}</h2>
      <p>${x.datum}</p>
    </div>`;
  });
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schulungen</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#111;color:white;padding:20px;}
h1{text-align:center;font-size:42px;margin-bottom:30px;}
.top-bar{display:flex;justify-content:center;gap:15px;margin-bottom:30px;flex-wrap:wrap;}
.admin-btn{background:#2563eb;color:white;border:none;padding:12px 20px;border-radius:12px;cursor:pointer;font-size:16px;font-weight:bold;text-decoration:none;}
.delete-btn{background:#dc2626;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:20px;max-width:1300px;margin:auto;}
.card{background:#1c1c1f;padding:20px;border-radius:20px;position:relative;}
.card h2{margin-bottom:10px;}
.card p{margin-bottom:8px;color:#ccc;}
.remove-btn{position:absolute;top:10px;right:10px;background:#dc2626;color:white;border:none;border-radius:8px;padding:5px 8px;cursor:pointer;}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);justify-content:center;align-items:center;z-index:999;}
.modal-content{background:#1c1c1f;padding:20px;border-radius:20px;width:90%;max-width:600px;max-height:90vh;overflow-y:auto;}
input,textarea{width:100%;padding:12px;margin-bottom:12px;border-radius:10px;border:1px solid #444;background:#111;color:white;}
.button-row{display:flex;gap:10px;flex-wrap:wrap;}
</style>
</head>
<body>

  <h1>Schulungen</h1>

<div class="top-bar">
  <a href="startseite.html" class="admin-btn">Zurück</a>
  <button class="admin-btn" onclick="oeffneModal()">+ Schulung hinzufügen</button>
</div>

<div class="grid" id="container"></div>

<div class="modal" id="modal">
  <div class="modal-content">
    <input type="text" id="titel" placeholder="Welche Schulung war es?">
    <textarea id="beschreibung" placeholder="Worum ging es?"></textarea>
    <input type="date" id="datum">

    <label>Bilder auswählen</label>
    <input type="file" id="bilder" multiple accept="image/*">

    <label>Videos auswählen</label>
    <input type="file" id="videos" multiple accept="video/*">

    <label>Dokumente auswählen</label>
    <input type="file" id="dokumente" multiple accept="application/pdf">

    <div class="button-row">
      <button class="admin-btn" onclick="speichern()">Speichern</button>
      <button class="admin-btn delete-btn" onclick="schliessen()">Abbrechen</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

const firebaseConfig = { /* gleich lassen */ };

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);
const storage = getStorage(app);

const schulungenRef = ref(db, "schulungen");

let userRolle = "";
let liste = [];

onAuthStateChanged(auth, (user) => {
  if(!user){
    window.location.href = "index.html";
    return;
  }

  onValue(ref(db,"benutzer"), (snap)=>{
    snap.forEach(c=>{
      const d = c.val();
      if(d.uid === user.uid){
        userRolle = d.rolle;
      }
    });
  }, {onlyOnce:true});
});

window.speichern = async () => {
  if(userRolle !== "admin"){
    alert("Nur Admin!");
    return;
  }

  const titel = document.getElementById("titel").value;
  const datum = document.getElementById("datum").value;

  if(!datum){
    alert("Datum ist Pflicht!");
    return;
  }

  const bilder = [];
  const videos = [];
  const dokumente = [];

  for(const f of document.getElementById("bilder").files){
    const refFile = storageRef(storage,"schulungen/"+Date.now()+f.name);
    await uploadBytes(refFile,f);
    bilder.push(await getDownloadURL(refFile));
  }

  for(const f of document.getElementById("videos").files){
    const refFile = storageRef(storage,"schulungen/"+Date.now()+f.name);
    await uploadBytes(refFile,f);
    videos.push(await getDownloadURL(refFile));
  }

  for(const f of document.getElementById("dokumente").files){
    const refFile = storageRef(storage,"schulungen/"+Date.now()+f.name);
    await uploadBytes(refFile,f);
    dokumente.push(await getDownloadURL(refFile));
  }

  await push(schulungenRef,{
    titel: titel || "",
    datum,
    bilder,
    videos,
    dokumente
  });

  alert("Gespeichert");
  location.reload();
}

onValue(schulungenRef,(snap)=>{
  liste=[];
  snap.forEach(c=>liste.push({id:c.key,...c.val()}));
  console.log(liste);
});
</script>

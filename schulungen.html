<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schulungen</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#0f0f11;color:white;padding:20px;}

h1{text-align:center;margin-bottom:30px;font-size:38px;}

.top-bar{
  display:flex;
  justify-content:center;
  gap:15px;
  margin-bottom:30px;
}

.admin-btn{
  background:#2563eb;
  padding:12px 20px;
  border-radius:12px;
  color:white;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:20px;
  max-width:1200px;
  margin:auto;
}

.card{
  background:#1c1c1f;
  padding:15px;
  border-radius:20px;
  cursor:pointer;
  position:relative;
}

.card img{
  width:100%;
  border-radius:15px;
  max-height:200px;
  object-fit:cover;
}

.card h2{margin-top:10px;}
.card p{color:#aaa;margin-top:5px;}

.remove-btn{
  position:absolute;
  top:10px;
  right:10px;
  background:#dc2626;
  border:none;
  color:white;
  border-radius:8px;
  padding:5px 8px;
  cursor:pointer;
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
  z-index:999;
}

.modal-content{
  background:#1c1c1f;
  padding:20px;
  border-radius:20px;
  width:90%;
  max-width:900px;
  max-height:90vh;
  overflow-y:auto;
}

.modal img,
.modal video{
  width:100%;
  border-radius:10px;
  margin-top:10px;
}

.upload-modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.upload-box{
  background:#1c1c1f;
  padding:20px;
  border-radius:20px;
  width:90%;
  max-width:500px;
}

input,textarea{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  background:#111;
  color:white;
  border:1px solid #444;
}
</style>
</head>

<body>

<h1>Schulungen</h1>

<div class="top-bar">
  <a href="startseite.html" class="admin-btn">Zurück</a>
  <button class="admin-btn" onclick="oeffneModal()">+ Schulung hinzufügen</button>
</div>

<div class="grid" id="container"></div>

<div class="modal" id="modal">
  <div class="modal-content">
    <input type="text" id="titel" placeholder="Titel">
    <textarea id="beschreibung" placeholder="Beschreibung"></textarea>
    <input type="date" id="datum">

    <label>Bilder auswählen</label>
    <input type="file" id="bilder" multiple accept="image/*">

    <label>Videos auswählen</label>
    <input type="file" id="videos" multiple accept="video/*">

    <label>Dokumente auswählen</label>
    <input type="file" id="dokumente" multiple accept="application/pdf">

    <button class="admin-btn" onclick="speichern()">Speichern</button>
    <button class="admin-btn" onclick="schliessen()">Abbrechen</button>
  </div>
</div>

<div class="modal" id="detailModal">
  <div class="modal-content" id="detailContent"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyBiKHmV0HEBB2Gr74VOgbosxRGs9MDa7uQ",
  authDomain: "nksp-app.firebaseapp.com",
  databaseURL: "https://nksp-app-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "nksp-app",
  storageBucket: "nksp-app.firebasestorage.app",
  messagingSenderId: "328702502215",
  appId: "1:328702502215:web:080148f3e768bfafc29862"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);
const storage = getStorage(app);

const dbRef = ref(db,"schulungen");

let rolle="";
let liste=[];

/* 🔥 DATUM FORMATIERUNG */
function formatDatum(d){
  const date = new Date(d);
  const tag = String(date.getDate()).padStart(2,"0");
  const monat = String(date.getMonth()+1).padStart(2,"0");
  const jahr = date.getFullYear();
  return `${tag}.${monat}.${jahr}`;
}

/* LOGIN */
onAuthStateChanged(auth,(user)=>{
  if(!user){
    window.location.href="index.html";
    return;
  }

  onValue(ref(db,"benutzer"),snap=>{
    snap.forEach(c=>{
      if(c.val().uid===user.uid){
        rolle=c.val().rolle;
        render();

        if(rolle!=="admin"){
          document.querySelector(".top-bar button").style.display="none";
        }
      }
    });
  },{onlyOnce:true});
});

/* MODAL */
window.oeffneModal=()=> document.getElementById("modal").style.display="flex";
window.schliessen=()=> document.getElementById("modal").style.display="none";

/* SPEICHERN */
window.speichern=async()=>{
  if(rolle!=="admin") return alert("Nur Admin");

  const datum=document.getElementById("datum").value;
  if(!datum) return alert("Datum Pflicht");

  const titel=document.getElementById("titel").value;
  const beschreibung=document.getElementById("beschreibung").value;

  await push(dbRef,{
    titel: titel || "",
    datum,
    beschreibung: beschreibung || ""
  });

  alert("Gespeichert");
  location.reload();
};

/* DETAIL */
window.showDetail=(i)=>{
  const x=liste[i];

  let html=`
  <button onclick="document.getElementById('detailModal').style.display='none'" 
  style="margin-bottom:10px;padding:8px 12px;border:none;border-radius:8px;background:#2563eb;color:white;">
  Zurück
  </button>

  <h2>${x.titel || "Schulung"}</h2>
  <p>${formatDatum(x.datum)}</p>
  <p>${x.beschreibung || ""}</p>
  `;

  document.getElementById("detailContent").innerHTML=html;
  document.getElementById("detailModal").style.display="flex";
};

/* LÖSCHEN */
window.loeschen = async function(i){
  if(rolle !== "admin") return;

  const ok = confirm("Wirklich löschen?");
  if(!ok) return;

  const eintrag = liste[i];

  await push(ref(db, "papierkorb"), {
    ...eintrag,
    originalPfad: "schulungen", // 🔁 HIER ANPASSEN!
    geloeschtAm: Date.now()
  });

  await remove(ref(db, "schulungen/" + eintrag.id));
};

/* RENDER */
function render(){
  const container=document.getElementById("container");
  container.innerHTML="";

  liste.forEach((x,i)=>{
    container.innerHTML+=`
    <div class="card" onclick="showDetail(${i})">
      ${rolle==="admin" ? `<button class="remove-btn" onclick="event.stopPropagation();loeschen(${i})">X</button>` : ""}
      <h2>${x.titel || "Schulung"}</h2>
      <p>${formatDatum(x.datum)}</p>
    </div>`;
  });
}

/* 🔥 DATEN + SORTIERUNG */
onValue(dbRef,snap=>{
  liste=[];
  snap.forEach(c=>{
    liste.push({id:c.key,...c.val()});
  });

  // ÄLTESTES DATUM OBEN
  liste.sort((a,b)=> new Date(a.datum) - new Date(b.datum));

  render();
});
</script>

</body>
</html>

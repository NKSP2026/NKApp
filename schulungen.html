<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Schulungen</title>

<style>
body{background:#111;color:white;padding:20px;font-family:Arial;}
h1{text-align:center;margin-bottom:30px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;}

.card{background:#1c1c1f;padding:15px;border-radius:15px;cursor:pointer;position:relative;}
.card img{width:100%;border-radius:10px;}

.remove-btn{position:absolute;top:10px;right:10px;background:red;color:white;border:none;}

.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);justify-content:center;align-items:center;}
.modal-content{background:#1c1c1f;padding:20px;border-radius:15px;width:90%;max-width:800px;max-height:90vh;overflow:auto;}
</style>
</head>

<body>

<h1>Schulungen</h1>

<button onclick="oeffneModal()">+ Schulung</button>

<div class="grid" id="container"></div>

<div class="modal" id="modal">
<div class="modal-content">
<input id="titel" placeholder="Titel">
<input type="date" id="datum">
<input type="file" id="bilder" multiple>

<button onclick="speichern()">Speichern</button>
</div>
</div>

<div class="modal" id="detailModal">
<div class="modal-content" id="detailContent"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getDatabase,ref,push,onValue,remove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
import { getStorage,ref as sRef,uploadBytes,getDownloadURL } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

const app=initializeApp({apiKey:"AIzaSy...",authDomain:"nksp-app.firebaseapp.com",databaseURL:"https://nksp-app-default-rtdb.europe-west1.firebasedatabase.app"});
const auth=getAuth(app);
const db=getDatabase(app);
const storage=getStorage(app);

const refDB=ref(db,"schulungen");

let rolle="",liste=[];

onAuthStateChanged(auth,user=>{
onValue(ref(db,"benutzer"),snap=>{
snap.forEach(c=>{
if(c.val().uid===user.uid)rolle=c.val().rolle;
});
});
});

window.oeffneModal=()=>modal.style.display="flex";

window.speichern=async()=>{
const datum=document.getElementById("datum").value;
if(!datum)return alert("Datum fehlt");

const files=document.getElementById("bilder").files;
const arr=[];

for(const f of files){
const r=sRef(storage,"schulungen/"+Date.now()+f.name);
await uploadBytes(r,f);
arr.push(await getDownloadURL(r));
}

await push(refDB,{datum,arr});
location.reload();
};

window.showDetail=i=>{
const x=liste[i];
detailContent.innerHTML=(x.arr||[]).map(u=>`<img src="${u}" style="width:100%">`).join("");
detailModal.style.display="flex";
};

window.loeschen=async(i)=>{
if(rolle!=="admin")return;
await remove(ref(db,"schulungen/"+liste[i].id));
};

onValue(refDB,snap=>{
liste=[];
snap.forEach(c=>liste.push({id:c.key,...c.val()}));

container.innerHTML="";
liste.forEach((x,i)=>{
container.innerHTML+=`
<div class="card" onclick="showDetail(${i})">
${rolle==="admin"?`<button class="remove-btn" onclick="event.stopPropagation();loeschen(${i})">X</button>`:""}
${x.arr?.[0]?`<img src="${x.arr[0]}">`:""}
<p>${x.datum}</p>
</div>`;
});
});
</script>
</body>
</html>

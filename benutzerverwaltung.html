<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Benutzerverwaltung - NKSP</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#111;
      color:white;
      padding:20px;
      min-height:100vh;
    }

    h1{
      text-align:center;
      font-size:42px;
      margin-bottom:30px;
    }

    .top-bar{
      display:flex;
      justify-content:center;
      gap:15px;
      flex-wrap:wrap;
      margin-bottom:30px;
    }

    .admin-btn{
      background:#2563eb;
      color:white;
      border:none;
      padding:14px 22px;
      border-radius:12px;
      cursor:pointer;
      font-size:16px;
      font-weight:bold;
      text-decoration:none;
    }

    .admin-btn:hover{
      background:#1d4ed8;
    }

    .container{
      max-width:1100px;
      margin:auto;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
      gap:20px;
    }

    .card{
      background:#1c1c1f;
      border-radius:20px;
      padding:20px;
      position:relative;
      border:1px solid #2f2f35;
    }

    .status{
      position:absolute;
      top:20px;
      right:20px;
      width:14px;
      height:14px;
      border-radius:50%;
      background:#ef4444;
      box-shadow:0 0 10px rgba(239,68,68,0.7);
    }

    .status.online{
      background:#22c55e;
      box-shadow:0 0 10px rgba(34,197,94,0.7);
    }

    .card h2{
      font-size:24px;
      margin-bottom:15px;
      padding-right:25px;
    }

    .card p{
      color:#ccc;
      margin-bottom:10px;
      line-height:1.5;
      word-break:break-word;
    }

    .rolle{
      display:inline-block;
      margin-top:10px;
      padding:8px 12px;
      border-radius:10px;
      font-size:14px;
      font-weight:bold;
      background:#374151;
    }

    .rolle.admin{
      background:#dc2626;
    }

    .rolle.mitarbeiter{
      background:#2563eb;
    }

    .leer{
      text-align:center;
      color:#888;
      margin-top:40px;
      font-size:18px;
    }

    @media(max-width:700px){
      h1{
        font-size:32px;
      }
    }
  </style>
</head>
<body>

  <h1>Benutzerverwaltung</h1>

  <div class="top-bar">
    <a href="startseite.html" class="admin-btn">Zurück</a>
  </div>

  <div class="container" id="container"></div>
  <div class="leer" id="leer"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBiKHmV0HEBB2Gr74VOgbosxRGs9MDa7uQ",
  authDomain: "nksp-app.firebaseapp.com",
  databaseURL: "https://nksp-app-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "nksp-app",
  storageBucket: "nksp-app.firebasestorage.app",
  messagingSenderId: "328702502215",
  appId: "1:328702502215:web:080148f3e768bfafc29862"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const benutzerRef = ref(db, "benutzer");

let aktuellerBenutzer = null;
let alleBenutzer = [];
let eigenerEintragKey = "";

onAuthStateChanged(auth, (user) => {
  if(!user){
    window.location.href = "index.html";
    return;
  }

  onValue(benutzerRef, async (snapshot) => {
    alleBenutzer = [];
    let aktuellerDatensatz = null;

    snapshot.forEach((child) => {
      const daten = {
        id: child.key,
        ...child.val()
      };

      alleBenutzer.push(daten);

      if(daten.uid === user.uid){
        aktuellerDatensatz = daten;
        eigenerEintragKey = child.key;
      }
    });

    if(!aktuellerDatensatz || aktuellerDatensatz.rolle !== "admin"){
      alert("Nur Admins dürfen diese Seite öffnen");
      window.location.href = "startseite.html";
      return;
    }

    aktuellerBenutzer = aktuellerDatensatz;

    if(eigenerEintragKey){
      await update(ref(db, "benutzer/" + eigenerEintragKey), {
        online: true,
        letzteAktivitaet: new Date().toISOString()
      });
    }

    render();
  });
});

window.addEventListener("beforeunload", async () => {
  if(eigenerEintragKey){
    try{
      await update(ref(db, "benutzer/" + eigenerEintragKey), {
        online: false,
        letzteAktivitaet: new Date().toISOString()
      });
    }catch(error){
      console.error(error);
    }
  }
});

document.addEventListener("visibilitychange", async () => {
  if(!eigenerEintragKey) return;

  try{
    if(document.visibilityState === "visible"){
      await update(ref(db, "benutzer/" + eigenerEintragKey), {
        online: true,
        letzteAktivitaet: new Date().toISOString()
      });
    }else{
      await update(ref(db, "benutzer/" + eigenerEintragKey), {
        online: false,
        letzteAktivitaet: new Date().toISOString()
      });
    }
  }catch(error){
    console.error(error);
  }
});

function render(){
  const container = document.getElementById("container");
  const leer = document.getElementById("leer");

  container.innerHTML = "";

  if(alleBenutzer.length === 0){
    leer.innerText = "Keine Benutzer gefunden";
    return;
  }

  leer.innerText = "";

  alleBenutzer.forEach((user) => {
    container.innerHTML += `
      <div class="card">
        <div class="status ${user.online ? "online" : ""}"></div>
        <h2>${user.vorname || ""} ${user.nachname || ""}</h2>
        <p><strong>Benutzername:</strong> ${user.benutzername || "-"}</p>
        <p><strong>E-Mail:</strong> ${user.email || "-"}</p>
        <p><strong>Rolle:</strong> ${user.rolle || "-"}</p>
        <p><strong>Status:</strong> ${user.online ? "Online" : "Offline"}</p>
        <span class="rolle ${user.rolle}">${user.rolle || "-"}</span>
      </div>
    `;
  });
}
</script>

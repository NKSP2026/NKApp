<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dienste</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:Arial,sans-serif;
}

body{
  background:#111;
  color:white;
  padding:20px;
}

h1{
  text-align:center;
  font-size:48px;
  margin-bottom:30px;
}

.top-bar{
  display:flex;
  justify-content:center;
  gap:15px;
  margin-bottom:30px;
  flex-wrap:wrap;
}

.admin-btn{
  background:#2563eb;
  color:white;
  border:none;
  padding:12px 20px;
  border-radius:12px;
  cursor:pointer;
  font-size:16px;
  font-weight:bold;
  text-decoration:none;
}

.delete-btn{
  background:#dc2626;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:25px;
  max-width:1400px;
  margin:auto;
}

/* MOBILE */
@media(max-width:1000px){
  .grid{
    grid-template-columns:1fr;
  }

  .card{
    flex-direction:column;
  }

  .card-actions{
    width:100%;
    align-items:stretch;
  }
}

/* CARD */
.card{
  background:#1c1c1f;
  border-radius:22px;
  padding:25px;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:30px;
  position:relative;
  transition:0.2s;
}

.card:hover{
  transform:scale(1.01);
}

/* LINKER INHALT */
.card-main{
  flex:1;
}

.card h2{
  font-size:32px;
  margin-bottom:20px;
  color:white;
}

/* SAUBERE ZEILEN */
.info-row{
  display:flex;
  align-items:flex-start;
  margin-bottom:12px;
  gap:15px;
}

.info-label{
  min-width:190px;
  font-weight:bold;
  color:white;
  font-size:17px;
}

.info-value{
  flex:1;
  color:#d1d5db;
  font-size:17px;
  line-height:1.5;
}

/* BUTTON RECHTS */
.card-actions{
  display:flex;
  flex-direction:column;
  gap:12px;
  min-width:180px;
}

.card-actions .admin-btn{
  width:100%;
  text-align:center;
}

/* DELETE */
.remove-btn{
  position:absolute;
  top:12px;
  right:12px;
  background:#dc2626;
  color:white;
  border:none;
  border-radius:8px;
  padding:6px 10px;
  cursor:pointer;
  font-weight:bold;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
  z-index:999;
}

.modal-content{
  background:#1c1c1f;
  padding:25px;
  border-radius:20px;
  width:90%;
  max-width:500px;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:10px;
  border:1px solid #444;
  background:#111;
  color:white;
}

.button-row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
</style>
</head>

<body>

<h1>Dienste</h1>

<div class="top-bar">
  <a href="startseite.html" class="admin-btn">Zurück</a>
  <button class="admin-btn" onclick="oeffne()">+ Dienst hinzufügen</button>
</div>

<div class="grid" id="container"></div>

<!-- MODAL -->
<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <input type="date" id="datum">
    <input type="time" id="von">
    <input type="time" id="bis">
    <input id="ort" placeholder="Veranstaltungsort">
    <input id="art" placeholder="Veranstaltungsart">
    <input id="auftraggeber" placeholder="Auftraggeber">
    <input id="verantwortlich" placeholder="Verantwortlicher vor Ort">
    <input id="personal" type="number" placeholder="Benötigtes Personal">

    <div class="button-row">
      <button class="admin-btn" onclick="speichern()">Speichern</button>
      <button class="admin-btn" onclick="fertig()">Fertig</button>
      <button class="admin-btn delete-btn" onclick="schliessen()">Abbrechen</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import {
  getDatabase,
  ref,
  push,
  onValue,
  remove,
  update
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBiKHmV0HEBB2Gr74VOgbosxRGs9MDa7uQ",
  authDomain: "nksp-app.firebaseapp.com",
  databaseURL: "https://nksp-app-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "nksp-app",
  storageBucket: "nksp-app.firebasestorage.app",
  messagingSenderId: "328702502215",
  appId: "1:328702502215:web:080148f3e768bfafc29862"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);
const diensteRef = ref(db, "dienste");

let liste = [];
let userRolle = "";
let bearbeiteID = null;

/* LOGIN + ROLLE */
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "index.html";
    return;
  }

  onValue(ref(db, "benutzer"), (snapshot) => {
    snapshot.forEach((child) => {
      const daten = child.val();

      if (daten.uid === user.uid) {
        userRolle = daten.rolle;

        if (userRolle !== "admin") {
          const addBtn = document.querySelector(".top-bar button");
          if (addBtn) addBtn.style.display = "none";
        }

        render();
      }
    });
  }, { onlyOnce: true });
});

/* MODAL ÖFFNEN */
window.oeffne = function () {
  if (userRolle !== "admin") {
    alert("Nur Admins dürfen Dienste hinzufügen");
    return;
  }

  bearbeiteID = null;

  document.getElementById("datum").value = "";
  document.getElementById("von").value = "";
  document.getElementById("bis").value = "";
  document.getElementById("ort").value = "";
  document.getElementById("art").value = "";
  document.getElementById("auftraggeber").value = "";
  document.getElementById("verantwortlich").value = "";
  document.getElementById("personal").value = "";

  document.getElementById("modal").style.display = "flex";
};

/* MODAL SCHLIESSEN */
window.schliessen = function () {
  document.getElementById("modal").style.display = "none";
};

/* FERTIG BUTTON */
window.fertig = function () {
  schliessen();
};

/* DATUM FORMAT */
function formatDatum(datum) {
  if (!datum) return "";

  const teile = datum.split("-");
  if (teile.length !== 3) return datum;

  return `${teile[2]}.${teile[1]}.${teile[0]}`;
}

/* DAUER */
function berechneDauer(von, bis) {
  if (!von || !bis) return "";

  const [vh, vm] = von.split(":").map(Number);
  const [bh, bm] = bis.split(":").map(Number);

  const start = vh * 60 + vm;
  const ende = bh * 60 + bm;
  const diff = ende - start;

  const stunden = Math.floor(diff / 60);
  const minuten = diff % 60;

  return `${stunden}h ${minuten}min`;
}

/* ZUSAGEN / ABSAGEN */
window.antworten = async function (id, typ) {
  const user = auth.currentUser;
  if (!user) {
    alert("Bitte zuerst einloggen");
    return;
  }

  const dienst = liste.find(x => x.id === id);
  if (!dienst) return;

  const maxPersonal = Number(dienst.personal || 0);
  const aktuelleZusagen = dienst.zusagen
    ? Object.keys(dienst.zusagen).length
    : 0;

  if (
    typ === "zusagen" &&
    maxPersonal > 0 &&
    aktuelleZusagen >= maxPersonal
  ) {
    alert("Dieser Dienst ist bereits vollständig besetzt");
    return;
  }

  let name = "Unbekannt";

  await new Promise((resolve) => {
    onValue(ref(db, "benutzer"), (snapshot) => {
      snapshot.forEach((child) => {
        const daten = child.val();

        if (daten.uid === user.uid) {
          name = `${daten.vorname || ""} ${daten.nachname || ""}`;
        }
      });

      resolve();
    }, { onlyOnce: true });
  });

  await push(ref(db, `dienste/${id}/${typ}`), {
    uid: user.uid,
    name,
    zeit: Date.now()
  });

  if (typ === "zusagen") {
    await push(ref(db, "benachrichtigungen"), {
      titel: "Neue Dienst-Zusage",
      name,
      typ: "Dienst",
      text: `${name} hat bei einem Dienst zugesagt`,
      zeit: Date.now()
    });
  }

  alert("Antwort gespeichert");
};

/* SPEICHERN */
window.speichern = async function () {
  if (userRolle !== "admin") {
    alert("Nur Admins dürfen speichern");
    return;
  }

  const daten = {
    datum: document.getElementById("datum").value,
    von: document.getElementById("von").value,
    bis: document.getElementById("bis").value,
    ort: document.getElementById("ort").value || "",
    art: document.getElementById("art").value || "",
    auftraggeber: document.getElementById("auftraggeber").value || "",
    verantwortlich: document.getElementById("verantwortlich").value || "",
    personal: document.getElementById("personal").value || ""
  };

  if (!daten.datum || !daten.von || !daten.bis) {
    alert("Bitte Datum + Uhrzeit ausfüllen");
    return;
  }

  try {
    if (bearbeiteID) {
      await update(ref(db, "dienste/" + bearbeiteID), daten);

      await push(ref(db, "benachrichtigungen"), {
        titel: "Dienst geändert",
        name: "System",
        typ: "Dienst",
        text: `Ein Dienst am ${formatDatum(daten.datum)} wurde geändert`,
        zeit: Date.now()
      });

      alert("Dienst aktualisiert");
      schliessen();
      location.reload();
      return;
    }

    await push(diensteRef, daten);

    await push(ref(db, "benachrichtigungen"), {
      titel: "Neuer Dienst eingetragen",
      name: "System",
      typ: "Dienst",
      text: `Neuer Dienst am ${formatDatum(daten.datum)} wurde eingetragen`,
      zeit: Date.now()
    });

    alert("Dienst gespeichert");

    document.getElementById("datum").value = "";
    document.getElementById("von").value = "";
    document.getElementById("bis").value = "";
    document.getElementById("ort").value = "";
    document.getElementById("art").value = "";
    document.getElementById("auftraggeber").value = "";
    document.getElementById("verantwortlich").value = "";
    document.getElementById("personal").value = "";

  } catch (error) {
    console.error(error);
    alert("Fehler beim Speichern");
  }
};

/* BEARBEITEN */
window.bearbeiten = function (i) {
  if (userRolle !== "admin") return;

  const x = liste[i];
  if (!x) return;

  bearbeiteID = x.id;

  document.getElementById("datum").value = x.datum || "";
  document.getElementById("von").value = x.von || "";
  document.getElementById("bis").value = x.bis || "";
  document.getElementById("ort").value = x.ort || "";
  document.getElementById("art").value = x.art || "";
  document.getElementById("auftraggeber").value = x.auftraggeber || "";
  document.getElementById("verantwortlich").value = x.verantwortlich || "";
  document.getElementById("personal").value = x.personal || "";

  document.getElementById("modal").style.display = "flex";
};

/* LÖSCHEN */
window.loeschen = async function (i) {
  if (userRolle !== "admin") return;

  if (!confirm("Wirklich löschen?")) return;

  const eintrag = liste[i];
  if (!eintrag) return;

  await push(ref(db, "papierkorb"), {
    ...eintrag,
    originalPfad: "dienste",
    geloeschtAm: Date.now()
  });

  await remove(ref(db, "dienste/" + eintrag.id));

  alert("Dienst gelöscht");
};

/* RENDER */
function render() {
  const c = document.getElementById("container");
  c.innerHTML = "";

  liste.forEach((x, i) => {
    const maxPersonal = Number(x.personal || 0);
    const aktuelleZusagen = x.zusagen
      ? Object.keys(x.zusagen).length
      : 0;

    const voll = maxPersonal > 0 && aktuelleZusagen >= maxPersonal;

    c.innerHTML += `
      <div class="card">

        ${userRolle === "admin"
          ? `<button class="remove-btn" onclick="loeschen(${i})">X</button>`
          : ""}

        <div class="card-main">
          <h2>${formatDatum(x.datum)}</h2>

          <div class="info-row">
            <div class="info-label">Zeit:</div>
            <div class="info-value">
              ${x.von || "-"} - ${x.bis || "-"} (${berechneDauer(x.von, x.bis)})
            </div>
          </div>

          <div class="info-row">
            <div class="info-label">Ort:</div>
            <div class="info-value">${x.ort || "-"}</div>
          </div>

          <div class="info-row">
            <div class="info-label">Art:</div>
            <div class="info-value">${x.art || "-"}</div>
          </div>

          <div class="info-row">
            <div class="info-label">Auftraggeber:</div>
            <div class="info-value">${x.auftraggeber || "-"}</div>
          </div>

          <div class="info-row">
            <div class="info-label">Ansprechpartner:</div>
            <div class="info-value">${x.verantwortlich || "-"}</div>
          </div>

          <div class="info-row">
            <div class="info-label">Benötigtes Personal:</div>
            <div class="info-value">${aktuelleZusagen}/${maxPersonal || "-"}</div>
          </div>
        </div>

        <div class="card-actions">
          <button
            class="admin-btn"
            onclick="antworten('${x.id}','zusagen')"
            ${voll ? "disabled style='opacity:0.5;cursor:not-allowed;'" : ""}
          >
            ✅ Zusagen
          </button>

          <button
            class="admin-btn"
            onclick="antworten('${x.id}','absagen')"
          >
            ❌ Absagen
          </button>

          ${userRolle === "admin"
            ? `<button class="admin-btn" onclick="bearbeiten(${i})">✏ Bearbeiten</button>`
            : ""}
        </div>

      </div>
    `;
  });
}

/* LADEN */
onValue(diensteRef, (snapshot) => {
  liste = [];

  snapshot.forEach((child) => {
    liste.push({
      id: child.key,
      ...child.val()
    });
  });

  liste.sort((a, b) => new Date(a.datum) - new Date(b.datum));

  render();
});
</script>

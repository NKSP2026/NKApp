<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dienste</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif;}
body{background:#111;color:white;padding:20px;}
h1{text-align:center;font-size:48px;margin-bottom:30px;}
.top-bar{display:flex;justify-content:center;gap:15px;margin-bottom:30px;flex-wrap:wrap;}
.admin-btn{background:#2563eb;color:white;border:none;padding:12px 20px;border-radius:12px;cursor:pointer;font-size:16px;font-weight:bold;text-decoration:none;}
.container{max-width:1200px;margin:auto;}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:25px;}
.card{background:#1c1c1f;border-radius:22px;padding:20px;position:relative;}
.remove-btn{position:absolute;top:10px;right:10px;background:#dc2626;color:white;border:none;border-radius:8px;padding:5px 8px;cursor:pointer;}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);justify-content:center;align-items:center;}
.modal-content{background:#1c1c1f;border-radius:20px;padding:20px;width:90%;max-width:500px;}
input{width:100%;padding:12px;margin-bottom:12px;border-radius:10px;border:1px solid #444;background:#111;color:white;}
</style>
</head>
<body>
<h1>Dienste</h1>
<div class="top-bar">
  <a href="index.html" class="admin-btn">Zurück</a>
  <button class="admin-btn" onclick="oeffneDienstFormular()">+ Dienst hinzufügen</button>
</div>
<div class="container">
  <div class="grid" id="diensteContainer"></div>
</div>
<div class="modal" id="dienstModal">
  <div class="modal-content">
    <input type="date" id="dienstDatum">
    <input type="time" id="dienstVon">
    <input type="time" id="dienstBis">
    <input type="text" id="dienstOrt" placeholder="Veranstaltungsort">
    <input type="text" id="dienstArt" placeholder="Veranstaltungsart">
    <input type="text" id="dienstAuftraggeber" placeholder="Auftraggeber">
    <input type="text" id="dienstVerantwortlich" placeholder="Verantwortlicher vor Ort">
    <button class="admin-btn" onclick="speichereDienst()">Speichern</button>
  </div>
</div>
<script>
const adminPasswort = "Admin2026";
let dienstListe = [];
function oeffneDienstFormular(){
 const passwort=prompt('Admin Passwort eingeben');
 if(passwort !== adminPasswort) return;
 document.getElementById('dienstModal').style.display='flex';
}
function speichereDienst(){
 const datum=document.getElementById('dienstDatum').value;
 const von=document.getElementById('dienstVon').value;
 const bis=document.getElementById('dienstBis').value;
 const ort=document.getElementById('dienstOrt').value;
 const art=document.getElementById('dienstArt').value;
 const auftraggeber=document.getElementById('dienstAuftraggeber').value;
 const verantwortlich=document.getElementById('dienstVerantwortlich').value;
 if(!datum||!von||!bis||!ort||!art||!auftraggeber||!verantwortlich) return;
 dienstListe.push({datum,von,bis,ort,art,auftraggeber,verantwortlich});
 renderDienste();
 document.getElementById('dienstModal').style.display='none';
}
function renderDienste(){
 const container=document.getElementById('diensteContainer');
 container.innerHTML='';
 dienstListe.forEach((dienst,index)=>{
  container.innerHTML += `
  <div class="card">
    <button class="remove-btn" onclick="loescheDienst(${index})">X</button>
    <h2>${dienst.datum}</h2>
    <p>${dienst.von} - ${dienst.bis}</p>
    <p>${dienst.ort}</p>
    <p>${dienst.art}</p>
    <p>Auftraggeber: ${dienst.auftraggeber}</p>
    <p>Verantwortlich: ${dienst.verantwortlich}</p>
  </div>`;
 });
}
function loescheDienst(index){
 const passwort=prompt('Admin Passwort eingeben');
 if(passwort !== adminPasswort) return;
 dienstListe.splice(index,1);
 renderDienste();
}
</script>
</body>
</html>

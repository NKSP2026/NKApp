<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dienste</title>
<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:Arial,sans-serif;
}
body{
  background:#111;
  color:white;
  padding:20px;
}
h1{
  text-align:center;
  font-size:48px;
  margin-bottom:30px;
}
.top-bar{
  display:flex;
  justify-content:center;
  gap:15px;
  margin-bottom:30px;
  flex-wrap:wrap;
}
.admin-btn{
  background:#2563eb;
  color:white;
  border:none;
  padding:12px 20px;
  border-radius:12px;
  cursor:pointer;
  font-size:16px;
  font-weight:bold;
  text-decoration:none;
}
.delete-btn{
  background:#dc2626;
}
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:25px;
  max-width:1200px;
  margin:auto;
}
.card{
  background:#1c1c1f;
  border-radius:22px;
  padding:20px;
  position:relative;
}
.remove-btn{
  position:absolute;
  top:10px;
  right:10px;
  background:#dc2626;
  color:white;
  border:none;
  border-radius:8px;
  padding:5px 8px;
  cursor:pointer;
}
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}
.modal-content{
  background:#1c1c1f;
  padding:20px;
  border-radius:20px;
  width:90%;
  max-width:500px;
}
input{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:10px;
  border:1px solid #444;
  background:#111;
  color:white;
}
.button-row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
</style>
</head>
<body>

<h1>Dienste</h1>

<div class="top-bar">
  <a href="startseite.html" class="admin-btn">Zurück</a>
  <button class="admin-btn" onclick="oeffne()">+ Dienst hinzufügen</button>
</div>

<div class="grid" id="container"></div>

<div class="modal" id="modal">
  <div class="modal-content">
    <input type="date" id="datum">
    <input type="time" id="von">
    <input type="time" id="bis">
    <input id="ort" placeholder="Veranstaltungsort">
    <input id="art" placeholder="Veranstaltungsart">
    <input id="auftraggeber" placeholder="Auftraggeber">
    <input id="verantwortlich" placeholder="Verantwortlicher vor Ort">

    <div class="button-row">
      <button class="admin-btn" onclick="speichern()">Speichern</button>
      <button class="admin-btn delete-btn" onclick="schliessen()">Abbrechen</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBiKHmV0HEBB2Gr74VOgbosxRGs9MDa7uQ",
  authDomain: "nksp-app.firebaseapp.com",
  databaseURL: "https://nksp-app-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "nksp-app",
  storageBucket: "nksp-app.firebasestorage.app",
  messagingSenderId: "328702502215",
  appId: "1:328702502215:web:080148f3e768bfafc29862"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);
const diensteRef = ref(db, "dienste");

let liste = [];
let userRolle = "";

onAuthStateChanged(auth, (user) => {
  if(!user){
    window.location.href = "index.html";
    return;
  }

  onValue(ref(db, "benutzer"), (snapshot) => {
    snapshot.forEach((child) => {
      const daten = child.val();

      if(daten.uid === user.uid){
        userRolle = daten.rolle;

        if(userRolle !== "admin"){
          const addBtn = document.querySelector(".top-bar button");
          if(addBtn){
            addBtn.style.display = "none";
          }
        }

        render();
      }
    });
  }, {
    onlyOnce: true
  });
});

window.oeffne = function(){
  if(userRolle !== "admin"){
    alert("Nur Admins dürfen Dienste hinzufügen");
    return;
  }

  document.getElementById("modal").style.display = "flex";
}

window.schliessen = function(){
  document.getElementById("modal").style.display = "none";
}

window.speichern = async function(){
  if(userRolle !== "admin"){
    alert("Nur Admins dürfen Dienste speichern");
    return;
  }

  const datum = document.getElementById("datum").value;
  const von = document.getElementById("von").value;
  const bis = document.getElementById("bis").value;
  const ort = document.getElementById("ort").value;
  const art = document.getElementById("art").value;
  const auftraggeber = document.getElementById("auftraggeber").value;
  const verantwortlich = document.getElementById("verantwortlich").value;

  if(!datum || !von || !bis){
    alert("Bitte Datum und Uhrzeit ausfüllen");
    return;
  }

  try{
    await push(diensteRef, {
      datum,
      von,
      bis,
      ort,
      art,
      auftraggeber,
      verantwortlich
    });

    alert("Dienst gespeichert");

    document.getElementById("datum").value = "";
    document.getElementById("von").value = "";
    document.getElementById("bis").value = "";
    document.getElementById("ort").value = "";
    document.getElementById("art").value = "";
    document.getElementById("auftraggeber").value = "";
    document.getElementById("verantwortlich").value = "";

    schliessen();
  }catch(error){
    console.error(error);
    alert("Fehler beim Speichern");
  }
}

function formatDatum(datum){
  if(!datum) return "";

  const teile = datum.split("-");

  if(teile.length !== 3) return datum;

  return `${teile[2]}.${teile[1]}.${teile[0]}`;
}

function berechneDauer(von, bis){
  if(!von || !bis) return "";

  const [vonStunde, vonMinute] = von.split(":").map(Number);
  const [bisStunde, bisMinute] = bis.split(":").map(Number);

  const start = vonStunde * 60 + vonMinute;
  const ende = bisStunde * 60 + bisMinute;
  const diff = ende - start;

  const stunden = Math.floor(diff / 60);
  const minuten = diff % 60;

  return `${stunden},${minuten.toString().padStart(2, "0")} h`;
}

function render(){
  const c = document.getElementById("container");
  c.innerHTML = "";

  liste.forEach((x, i) => {
    c.innerHTML += `
      <div class="card">
        ${userRolle === "admin" ? `<button class="remove-btn" onclick="loeschen(${i})">X</button>` : ""}
        <h2>${formatDatum(x.datum)}</h2>
        <p>ca. ${x.von} - ${x.bis} (${berechneDauer(x.von, x.bis)})</p>
        <p>${x.ort || "-"}</p>
        <p>${x.art || "-"}</p>
        <p>Auftraggeber: ${x.auftraggeber || "-"}</p>
        <p>Verantwortlich: ${x.verantwortlich || "-"}</p>
      </div>
    `;
  });
}

window.loeschen = async function(i){
  if(userRolle !== "admin"){
    alert("Nur Admins dürfen Dienste löschen");
    return;
  }

  try{
    await remove(ref(db, "dienste/" + liste[i].id));
    alert("Dienst gelöscht");
  }catch(error){
    console.error(error);
    alert("Fehler beim Löschen");
  }
}

async function alteDiensteEntfernen(){
  const jetzt = new Date();

  for(const dienst of liste){
    if(!dienst.datum) continue;

    const dienstDatum = new Date(dienst.datum);
    dienstDatum.setDate(dienstDatum.getDate() + 2);
    dienstDatum.setHours(23, 59, 59, 999);

    if(jetzt > dienstDatum){
      try{
        await remove(ref(db, "dienste/" + dienst.id));
      }catch(error){
        console.error("Fehler beim automatischen Löschen:", error);
      }
    }
  }
}

onValue(diensteRef, (snapshot) => {
  liste = [];

  snapshot.forEach((child) => {
    liste.push({
      id: child.key,
      ...child.val()
    });
  });

  liste.sort((a, b) => {
    return new Date(a.datum) - new Date(b.datum);
  });

  render();
  alteDiensteEntfernen();
});
</script>

<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dienstberichte</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:Arial,sans-serif;
}

body{
  background:#111;
  color:white;
  padding:20px;
}

h1{
  text-align:center;
  font-size:48px;
  margin-bottom:30px;
}

.top-bar{
  display:flex;
  justify-content:center;
  gap:15px;
  margin-bottom:30px;
  flex-wrap:wrap;
}

.admin-btn{
  background:#2563eb;
  color:white;
  border:none;
  padding:12px 20px;
  border-radius:12px;
  cursor:pointer;
  font-size:16px;
  font-weight:bold;
  text-decoration:none;
}

.delete-btn{
  background:#dc2626;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:25px;
  max-width:1200px;
  margin:auto;
}

/* MOBILE */
@media(max-width:800px){
  .grid{
    grid-template-columns:1fr;
  }

  .card{
    flex-direction:column;
    align-items:flex-start;
  }

  .right{
    width:100%;
    margin-top:15px;
  }
}

/* CARD */
.card{
  background:#1c1c1f;
  border-radius:22px;
  padding:20px;
  display:flex;
  justify-content:space-between;
  gap:20px;
  align-items:flex-start;
  cursor:pointer;
  position:relative;
  transition:0.2s;
}

.card:hover{
  transform:scale(1.02);
}

/* LINKER BEREICH */
.left{
  flex:1;
}

/* TITEL */
.card h2{
  font-size:28px;
  margin-bottom:15px;
}

/* TEXT */
.card p{
  color:#ccc;
  margin-bottom:10px;
  font-size:16px;
}

/* RECHTS */
.right{
  display:flex;
  align-items:center;
}

/* DELETE */
.remove-btn{
  position:absolute;
  top:10px;
  right:10px;
  background:#dc2626;
  color:white;
  border:none;
  border-radius:8px;
  padding:5px 8px;
  cursor:pointer;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:#1c1c1f;
  padding:20px;
  border-radius:20px;
  width:90%;
  max-width:500px;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:10px;
  border:1px solid #444;
  background:#111;
  color:white;
}

.button-row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
</style>
</head>

<body>

<h1>Dienstberichte</h1>

<div class="top-bar">
  <a href="startseite.html" class="admin-btn">Zurück</a>
  <button class="admin-btn" onclick="document.getElementById('modal').style.display='flex'">
    + Dienstbericht hochladen
  </button>
</div>

<div class="grid" id="container"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <input id="titel" placeholder="Titel des Berichtes">
    <input id="dienst" placeholder="Dienst">
    <input id="mitarbeiter" placeholder="Mitarbeiter">
    <input type="file" id="datei" accept="application/pdf">

    <div class="button-row">
      <button class="admin-btn" onclick="speichern()">Speichern</button>
      <button class="admin-btn delete-btn" onclick="schliessen()">Abbrechen</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyBiKHmV0HEBB2Gr74VOgbosxRGs9MDa7uQ",
  authDomain: "nksp-app.firebaseapp.com",
  databaseURL: "https://nksp-app-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "nksp-app",
  storageBucket: "nksp-app.firebasestorage.app",
  messagingSenderId: "328702502215",
  appId: "1:328702502215:web:080148f3e768bfafc29862"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);
const storage = getStorage(app);

const dienstberichteRef = ref(db, "dienstberichte");
const benutzerRef = ref(db, "benutzer");

let liste = [];
let userRolle = "";

/* LOGIN + ROLLE */
onAuthStateChanged(auth, (user) => {
  if(!user){
    window.location.href = "index.html";
    return;
  }

  onValue(benutzerRef, (snapshot) => {
    snapshot.forEach((child) => {
      const daten = child.val();

      if(daten.uid === user.uid){
        userRolle = daten.rolle;

        if(userRolle !== "admin"){
          const btn = document.querySelector(".top-bar button");
          if(btn) btn.style.display = "none";
        }

        render();
      }
    });
  }, { onlyOnce:true });
});

/* MODAL */
window.oeffne = function(){
  if(userRolle !== "admin"){
    alert("Nur Admins dürfen hinzufügen");
    return;
  }

  document.getElementById("modal").style.display = "flex";
};

window.schliessen = function(){
  document.getElementById("modal").style.display = "none";
};

/* SPEICHERN */
window.speichern = async function(){
  if(userRolle !== "admin"){
    alert("Nur Admins dürfen speichern");
    return;
  }

  const titel = document.getElementById("titel").value;
  const dienst = document.getElementById("dienst").value;
  const mitarbeiter = document.getElementById("mitarbeiter").value;
  const datei = document.getElementById("datei").files[0];

  if(!titel || !dienst || !mitarbeiter || !datei){
    alert("Bitte alles ausfüllen");
    return;
  }

  try{
    const dateiname = Date.now() + "_" + datei.name;
    const fileRef = storageRef(storage, "dienstberichte/" + dateiname);

    await uploadBytes(fileRef, datei);
    const downloadURL = await getDownloadURL(fileRef);

    await push(dienstberichteRef, {
      titel,
      dienst,
      mitarbeiter,
      datei: downloadURL,
      storagePath: "dienstberichte/" + dateiname
    });

    await push(ref(db, "benachrichtigungen"), {
     titel: "Neuer Dienstbericht",
     name: mitarbeiter,
     typ: "Dienstbericht",
     text: `${mitarbeiter} hat den Bericht "${titel}" hochgeladen`,
     zeit: Date.now()
   });

    alert("Dienstbericht gespeichert");
    location.reload();

  }catch(error){
    console.error(error);
    alert("Fehler beim Speichern");
  }
};

/* RENDER */
function render(){
  const c = document.getElementById("container");
  c.innerHTML = "";

  liste.forEach((x, i) => {
    c.innerHTML += `
      <div class="card">
        ${userRolle === "admin"
          ? `<button class="remove-btn" onclick="loescheDienstbericht(${i})">X</button>`
          : ""}

        <div class="left">
          <h2>${x.titel}</h2>
          <p><strong>Dienst:</strong> ${x.dienst}</p>
          <p><strong>Mitarbeiter:</strong> ${x.mitarbeiter}</p>
        </div>

        <div class="right">
          <a href="${x.datei}" target="_blank" class="admin-btn">
            Herunterladen
          </a>
        </div>
      </div>
    `;
  });
}

/* LÖSCHEN */
window.loescheDienstbericht = async function(index){
  if(userRolle !== "admin"){
    alert("Nur Admins dürfen löschen");
    return;
  }

  const ok = confirm("Wirklich löschen?");
  if(!ok) return;

  const eintrag = liste[index];

  try{
    await push(ref(db, "papierkorb"), {
      ...eintrag,
      originalPfad: "dienstberichte",
      geloeschtAm: Date.now()
    });

    await remove(ref(db, "dienstberichte/" + eintrag.id));

    alert("In Papierkorb verschoben");
  }catch(error){
    console.error(error);
    alert("Fehler beim Löschen");
  }
};

/* LADEN */
onValue(dienstberichteRef, (snapshot) => {
  liste = [];

  snapshot.forEach((child) => {
    liste.push({
      id: child.key,
      ...child.val()
    });
  });

  render();
});
</script>

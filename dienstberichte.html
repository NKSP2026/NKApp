<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dienstberichte</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif;}
body{background:#111;color:white;padding:20px;}
h1{text-align:center;font-size:48px;margin-bottom:30px;}
.top-bar{display:flex;justify-content:center;gap:15px;margin-bottom:30px;flex-wrap:wrap;}
.admin-btn{background:#2563eb;color:white;border:none;padding:12px 20px;border-radius:12px;cursor:pointer;font-size:16px;font-weight:bold;text-decoration:none;}
.container{max-width:1200px;margin:auto;}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:25px;}
.card{background:#1c1c1f;border-radius:22px;padding:20px;position:relative;}
.remove-btn{position:absolute;top:10px;right:10px;background:#dc2626;color:white;border:none;border-radius:8px;padding:5px 8px;cursor:pointer;}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);justify-content:center;align-items:center;}
.modal-content{background:#1c1c1f;border-radius:20px;padding:20px;width:90%;max-width:500px;}
input{width:100%;padding:12px;margin-bottom:12px;border-radius:10px;border:1px solid #444;background:#111;color:white;}
</style>
</head>
<body>
<h1>Dienstberichte</h1>
<div class="top-bar">
  <a href="index.html" class="admin-btn">Zurück</a>
  <button class="admin-btn" onclick="oeffneBerichtFormular()">+ Dienstbericht hinzufügen</button>
</div>
<div class="container">
  <div class="grid" id="berichteContainer"></div>
</div>
<div class="modal" id="berichtModal">
  <div class="modal-content">
    <input type="text" id="berichtTitel" placeholder="Titel des Berichtes">
    <input type="text" id="berichtDienst" placeholder="Dienst">
    <input type="text" id="berichtMitarbeiter" placeholder="Mitarbeiter">
    <input type="file" id="berichtDatei" accept="application/pdf">
    <button class="admin-btn" onclick="speichereBericht()">Speichern</button>
  </div>
</div>
<script>
const adminPasswort = "Admin2026";
let berichtListe = [];
function oeffneBerichtFormular() {
 const passwort = prompt('Admin Passwort eingeben');
 if(passwort !== adminPasswort) return;
 document.getElementById('berichtModal').style.display='flex';
}
function speichereBericht() {
 const titel=document.getElementById('berichtTitel').value;
 const dienst=document.getElementById('berichtDienst').value;
 const mitarbeiter=document.getElementById('berichtMitarbeiter').value;
 const datei=document.getElementById('berichtDatei').files[0];
 if(!titel||!dienst||!mitarbeiter||!datei) return;
 const reader=new FileReader();
 reader.onload=function(e){
  berichtListe.push({titel,dienst,mitarbeiter,datei:e.target.result});
  renderBerichte();
  document.getElementById('berichtModal').style.display='none';
 };
 reader.readAsDataURL(datei);
}
function renderBerichte() {
 const container=document.getElementById('berichteContainer');
 container.innerHTML='';
 berichtListe.forEach((bericht,index)=>{
  container.innerHTML += `
  <div class="card">
    <button class="remove-btn" onclick="loescheBericht(${index})">X</button>
    <h2>${bericht.titel}</h2>
    <p>Dienst: ${bericht.dienst}</p>
    <p>Mitarbeiter: ${bericht.mitarbeiter}</p>
    <br>
    <a href="${bericht.datei}" download="${bericht.titel}.pdf" class="admin-btn">Herunterladen</a>
  </div>`;
 });
}
function loescheBericht(index){
 const passwort=prompt('Admin Passwort eingeben');
 if(passwort !== adminPasswort) return;
 berichtListe.splice(index,1);
 renderBerichte();
}
</script>
</body>
</html>

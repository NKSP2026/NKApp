<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Benachrichtigungen</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:Arial,sans-serif;
}

body{
  background:#111;
  color:white;
  padding:20px;
}

h1{
  text-align:center;
  font-size:48px;
  margin-bottom:30px;
}

.top-bar{
  display:flex;
  justify-content:center;
  gap:15px;
  margin-bottom:30px;
  flex-wrap:wrap;
}

.admin-btn{
  background:#2563eb;
  color:white;
  border:none;
  padding:12px 20px;
  border-radius:12px;
  cursor:pointer;
  font-size:16px;
  font-weight:bold;
  text-decoration:none;
}

.delete-btn{
  background:#dc2626;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:25px;
  max-width:1200px;
  margin:auto;
}

.card{
  background:#1c1c1f;
  border-radius:22px;
  padding:20px;
  position:relative;
}

.card h2{
  font-size:24px;
  margin-bottom:12px;
}

.card p{
  color:#ccc;
  margin-bottom:8px;
  font-size:16px;
}

.remove-btn{
  position:absolute;
  top:10px;
  right:10px;
  background:#dc2626;
  color:white;
  border:none;
  border-radius:8px;
  padding:6px 10px;
  cursor:pointer;
}

.leer{
  text-align:center;
  margin-top:40px;
  color:#888;
  font-size:18px;
}

@media(max-width:800px){
  .grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>
<body>

<h1>Benachrichtigungen</h1>

<div class="top-bar">
  <a href="startseite.html" class="admin-btn">Zurück</a>
</div>

<div class="grid" id="container"></div>
<div class="leer" id="leer"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import {
  getDatabase,
  ref,
  onValue,
  remove
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBiKHmV0HEBB2Gr74VOgbosxRGs9MDa7uQ",
  authDomain: "nksp-app.firebaseapp.com",
  databaseURL: "https://nksp-app-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "nksp-app",
  storageBucket: "nksp-app.firebasestorage.app",
  messagingSenderId: "328702502215",
  appId: "1:328702502215:web:080148f3e768bfafc29862"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const benachrichtigungenRef = ref(db, "benachrichtigungen");

let liste = [];
let userRolle = "";

/* LOGIN + ADMIN CHECK */
onAuthStateChanged(auth, (user) => {
  if(!user){
    window.location.href = "index.html";
    return;
  }

  onValue(ref(db, "benutzer"), (snapshot) => {
    let erlaubt = false;

    snapshot.forEach((child) => {
      const daten = child.val();

      if(daten.uid === user.uid){
        userRolle = daten.rolle;

        if(userRolle === "admin"){
          erlaubt = true;
        }
      }
    });

    if(!erlaubt){
      alert("Nur Admins dürfen diese Seite öffnen");
      window.location.href = "startseite.html";
      return;
    }

    render();
  }, {
    onlyOnce: true
  });
});

/* ZEIT FORMAT */
function formatZeit(timestamp){
  if(!timestamp) return "-";

  const d = new Date(timestamp);

  const tag = String(d.getDate()).padStart(2, "0");
  const monat = String(d.getMonth() + 1).padStart(2, "0");
  const jahr = d.getFullYear();

  const stunde = String(d.getHours()).padStart(2, "0");
  const minute = String(d.getMinutes()).padStart(2, "0");

  return `${tag}.${monat}.${jahr} - ${stunde}:${minute} Uhr`;
}

/* RENDER */
function render(){
  const c = document.getElementById("container");
  const leer = document.getElementById("leer");

  c.innerHTML = "";

  if(liste.length === 0){
    leer.innerText = "Keine Benachrichtigungen vorhanden";
    return;
  }

  leer.innerText = "";

  liste.forEach((x, i) => {
    c.innerHTML += `
      <div class="card">
        <button class="remove-btn" onclick="loeschen('${x.id}')">X</button>

        <h2>${x.titel || "Benachrichtigung"}</h2>

        <p><strong>Von:</strong> ${x.name || "-"}</p>
        <p><strong>Typ:</strong> ${x.typ || "-"}</p>
        <p><strong>Info:</strong> ${x.text || "-"}</p>
        <p><strong>Zeit:</strong> ${formatZeit(x.zeit)}</p>
      </div>
    `;
  });
}

/* LÖSCHEN */
window.loeschen = async function(id){
  const ok = confirm("Benachrichtigung wirklich löschen?");
  if(!ok) return;

  try{
    await remove(ref(db, "benachrichtigungen/" + id));
    alert("Benachrichtigung gelöscht");
  }catch(error){
    console.error(error);
    alert("Fehler beim Löschen");
  }
};

/* LADEN */
onValue(benachrichtigungenRef, (snapshot) => {
  liste = [];

  snapshot.forEach((child) => {
    liste.push({
      id: child.key,
      ...child.val()
    });
  });

  liste.sort((a, b) => (b.zeit || 0) - (a.zeit || 0));

  render();
});
</script>
